---

# --------------------------------------------------------------
# Includes
# --------------------------------------------------------------
include:
  - project: 'inuits/gitlab-ci/pipeline-templates'
    ref: 'v4.0.0'
    file: 
      - 'pipelines/docker-build-no-uat.yml'
      - 'jobs/docker/build-pip.yml'


# --------------------------------------------------------------
# Variables
# --------------------------------------------------------------
variables:
  CUSTOMER: inuits
  PROJECT: dams
  APPLICATION: collection

  HARBOR_PROJECT_DEV: elody-dams-dev


# --------------------------------------------------------------
# Template overrides
# --------------------------------------------------------------

# Disable prod, not needed
deliver-prod:
  rules:
    - when: never
